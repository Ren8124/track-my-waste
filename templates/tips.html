{% extends "base.html" %}
{% block title %}Eco-friendly Tips - TrackMyWaste{% endblock %}

{% block content %}
<h2 class="mb-4">
    <i class="fas fa-leaf text-success"></i> Eco-friendly Tips
</h2>

<div class="row">
    {% for tip in tips %}
        <div class="col-md-6 mb-4">
            <div class="card h-100 shadow-sm">
                <div class="card-body">
                    <h5 class="card-title text-success">
                        <i class="fas fa-lightbulb"></i> {{ tip.title }}
                    </h5>
                    <p class="card-text">{{ tip.content }}</p>
                    <span class="badge bg-secondary">{{ tip.category }}</span>
                </div>
            </div>
        </div>
    {% endfor %}
</div>

{% if not tips %}
    <div class="alert alert-info">
        <i class="fas fa-info-circle"></i> No tips available at the moment.
    </div>
{% endif %}
{% endblock %}
