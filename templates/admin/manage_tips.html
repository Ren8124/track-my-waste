{% extends "base.html" %}
{% block title %}Manage Tips - TrackMyWaste{% endblock %}

{% block content %}
<h2 class="mb-4">
    <i class="fas fa-lightbulb"></i> Manage Eco-friendly Tips
</h2>

<div class="card mb-4">
    <div class="card-header bg-warning text-white">
        <h5 class="mb-0">Add New Tip</h5>
    </div>
    <div class="card-body">
        <form method="POST" action="{{ url_for('admin.add_tip') }}">
            <div class="mb-3">
                <label class="form-label">Title *</label>
                <input type="text" class="form-control" name="title" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Content *</label>
                <textarea class="form-control" name="content" rows="3" required></textarea>
            </div>
            <div class="mb-3">
                <label class="form-label">Category</label>
                <select class="form-select" name="category">
                    <option value="general">General</option>
                    <option value="reduce">Reduce</option>
                    <option value="reuse">Reuse</option>
                    <option value="recycle">Recycle</option>
                    <option value="compost">Compost</option>
                </select>
            </div>
            <button type="submit" class="btn btn-warning">Add Tip</button>
        </form>
    </div>
</div>

<div class="card">
    <div class="card-body">
        <div class="table-responsive">
            <table class="table table-striped">
                <thead class="table-warning">
                    <tr>
                        <th>Title</th>
                        <th>Category</th>
                        <th>Content</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    {% for tip in tips %}
                        <tr>
                            <td>{{ tip.title }}</td>
                            <td>
                                <span class="badge bg-secondary">{{ tip.category }}</span>
                            </td>
                            <td>{{ tip.content[:100] }}...</td>
                            <td>
                                <form method="POST" action="{{ url_for('admin.delete_tip', tip_id=tip._id) }}" style="display:inline;">
                                    <button type="submit" class="btn btn-sm btn-danger" onclick="return confirm('Are you sure?')">
                                        <i class="fas fa-trash"></i>
                                    </button>
                                </form>
                            </td>
                        </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}
